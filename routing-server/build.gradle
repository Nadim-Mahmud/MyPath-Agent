plugins {
	id 'java'
	id 'org.springframework.boot' version '3.4.3'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.wheelchair'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(17)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-web'

	// https://mvnrepository.com/artifact/com.graphhopper/graphhopper-core
	implementation 'com.graphhopper:graphhopper-core:10.2'

	implementation 'org.slf4j:slf4j-api:2.0.16'
	implementation 'ch.qos.logback:logback-classic:1.5.16'

	// https://mvnrepository.com/artifact/org.openstreetmap.osmosis/osmosis-core
	implementation("org.openstreetmap.osmosis:osmosis-core:0.49.2")

	// https://mvnrepository.com/artifact/org.openstreetmap.osmosis/osmosis-pbf
	implementation("org.openstreetmap.osmosis:osmosis-pbf:0.49.2")

//	testImplementation 'org.springframework.boot:spring-boot-starter-test'
//	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

